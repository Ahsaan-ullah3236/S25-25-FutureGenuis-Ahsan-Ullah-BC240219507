<!-- Add padding-top so page content doesn't hide under header -->
<style>
    body {
        padding-top: 80px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* High contrast mode */
    .high-contrast {
        background-color: #000 !important;
        color: #fff !important;
    }
    .high-contrast a {
        color: #0ff !important;
    }

    /* Hover effects for links */
    .navbar-nav .nav-link:hover {
        color: #0d6efd !important;
        text-decoration: underline;
        transition: 0.3s;
    }

    /* Stylish brand */
    .navbar-brand:hover {
        color: #0d6efd;
        transition: 0.3s;
    }
</style>

<!-- High contrast toggle -->
<script>
    const highContrastBtn = document.getElementById('highContrastBtn');
    highContrastBtn.addEventListener('click', () => {
        document.body.classList.toggle('high-contrast');
    });
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>


    <h1>Welcome, Form Creator!</h1>
    <button id="createFormBtn" class="btn btn-primary mb-3">Create New Form</button>

    <h3>Your Forms:</h3>
    <div id="formsList">
        <div class="card form-card p-3" tabindex="0">
            <h5>Survey: Accessibility Awareness</h5>
            <button class="btn btn-sm btn-success previewBtn">Preview</button>
        </div>
        <div class="card form-card p-3" tabindex="0">
            <h5>Survey: Web UX Feedback</h5>
            <button class="btn btn-sm btn-success previewBtn">Preview</button>
        </div>
    </div>

    <script>
        const createFormBtn = document.getElementById('createFormBtn');
        const formsList = document.getElementById('formsList');

        createFormBtn.addEventListener('click', ()=>{
            window.location.href = "form_creator.html";
        });

        document.querySelectorAll('.previewBtn').forEach(btn=>{
            btn.addEventListener('click', (e)=>{
                alert('Preview Form clicked! (simulation)');
            });
        });

        formsList.addEventListener('keydown', (e)=>{
            if(e.key === 'Enter'){
                const btn = e.target.querySelector('.previewBtn');
                if(btn) btn.click();
            }
        });
    </script>
</body>
</html>
