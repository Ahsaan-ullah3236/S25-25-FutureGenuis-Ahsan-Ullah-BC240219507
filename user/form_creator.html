    <h1>Create New Form</h1>
    <label for="formTitle" class="form-label">Form Title:</label>
    <input type="text" id="formTitle" class="form-control mb-3" placeholder="Enter form title">

    <label for="formDesc" class="form-label">Form Description:</label>
    <textarea id="formDesc" class="form-control mb-3" placeholder="Enter form description"></textarea>

    <h3>Form Fields:</h3>
    <div id="fieldsContainer" class="mb-3">
        <button class="btn btn-sm btn-outline-primary addFieldBtn" data-type="text">Add Text Field</button>
        <button class="btn btn-sm btn-outline-primary addFieldBtn" data-type="email">Add Email Field</button>
        <button class="btn btn-sm btn-outline-primary addFieldBtn" data-type="number">Add Number Field</button>
        <button class="btn btn-sm btn-outline-primary addFieldBtn" data-type="checkbox">Add Checkbox</button>
        <button class="btn btn-sm btn-outline-primary addFieldBtn" data-type="radio">Add Radio</button>
        <button class="btn btn-sm btn-outline-primary addFieldBtn" data-type="dropdown">Add Dropdown</button>
    </div>

    <h3>Form Preview:</h3>
    <div id="formPreview" aria-live="polite"></div>

    <button id="saveFormBtn" class="btn btn-success mt-3">Save Form (Simulated)</button>
    <button id="goToRespondentBtn" class="btn btn-secondary mt-3">Go to Respondent View</button>

    <script>
        const formPreview = document.getElementById('formPreview');
        const addFieldBtns = document.querySelectorAll('.addFieldBtn');
        const saveFormBtn = document.getElementById('saveFormBtn');
        const goToRespondentBtn = document.getElementById('goToRespondentBtn');

        addFieldBtns.forEach(btn=>{
            btn.addEventListener('click', ()=>{
                const type = btn.dataset.type;
                const label = prompt(`Enter label for ${type} field:`) || type;
                let fieldHTML = '';
                switch(type){
                    case 'text':
                    case 'email':
                    case 'number':
                        fieldHTML = `<label>${label}:</label><input type="${type}" class="form-control mb-2">`;
                        break;
                    case 'checkbox':
                        fieldHTML = `<div class="form-check mb-2"><input type="checkbox" class="form-check-input"><label class="form-check-label">${label}</label></div>`;
                        break;
                    case 'radio':
                        fieldHTML = `<div class="form-check mb-2"><input type="radio" class="form-check-input" name="radioGroup"><label class="form-check-label">${label}</label></div>`;
                        break;
                    case 'dropdown':
                        fieldHTML = `<label>${label}:</label><select class="form-select mb-2"><option>Option 1</option><option>Option 2</option></select>`;
                        break;
                }
                const fieldDiv = document.createElement('div');
                fieldDiv.classList.add('field-item');
                fieldDiv.innerHTML = fieldHTML;
                formPreview.appendChild(fieldDiv);
            });
        });

        saveFormBtn.addEventListener('click', ()=>{
            alert('Form saved! (simulation, no backend)');
        });

        goToRespondentBtn.addEventListener('click', ()=>{
            window.location.href = "respondent_form.html";
        });
    </script>
</body>
